appId: com.jyy.calculate-jyy
productName: calculate_JYY
copyright: Copyright © 2026 JYY
asar: true
asarUnpack:
  - shared/**
directories:
  output: release
files:
  - main.cjs
  - preload.cjs
  - shared/**
  - package.json
  - dist/renderer/**
  - assets/icons/**
win:
  target:
    - nsis
    - portable
  icon: assets/icons/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: calculate_JYY
mac:
  target:
    - dmg
  icon: assets/icons/icon.icns
  category: public.app-category.utilities
linux:
  target:
    - AppImage
    - deb
  icon: assets/icons/icon.png
  category: Utility
