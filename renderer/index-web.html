<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1e1e2e" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-src 'none'; worker-src 'none';"
    />
    <title>calculate_JYY</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="header">
        <button
          id="history-toggle"
          class="icon-btn"
          title="历史记录 (Ctrl+H)"
          aria-label="历史记录"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M3 3v5h5"></path>
            <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path>
            <path d="M12 7v5l4 2"></path>
          </svg>
        </button>
        <h1 class="app-title">calculate_JYY</h1>
        <div class="header-actions">
          <button id="constants-toggle" class="icon-btn" title="常量库" aria-label="常量库">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
              <path d="M2 17l10 5 10-5"></path>
              <path d="M2 12l10 5 10-5"></path>
            </svg>
          </button>
          <button id="variables-toggle" class="icon-btn" title="变量列表" aria-label="变量列表">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M4 7h16M4 12h16M4 17h10"></path>
            </svg>
          </button>
          <button id="table-toggle" class="icon-btn" title="数值表格" aria-label="数值表格">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
          </button>
          <button id="spreadsheet-toggle" class="icon-btn" title="电子表格" aria-label="电子表格">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="3" y1="15" x2="21" y2="15"></line>
              <line x1="9" y1="3" x2="9" y2="21"></line>
              <line x1="15" y1="3" x2="15" y2="21"></line>
            </svg>
          </button>
          <button
            id="fraction-toggle"
            class="icon-btn"
            title="分数/小数切换 (S⇔D)"
            aria-label="分数小数切换"
          >
            <span style="font-size: 0.75rem; font-weight: 700">S⇔D</span>
          </button>
          <button
            id="exact-toggle"
            class="icon-btn"
            title="精确模式 (√2, π 等)"
            aria-label="精确模式切换"
          >
            <span style="font-size: 0.75rem; font-weight: 700">≈</span>
          </button>
          <button id="help-toggle" class="icon-btn" title="帮助 / Help (?)" aria-label="帮助">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </button>
          <button id="settings-toggle" class="icon-btn" title="设置" aria-label="设置">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
          </button>
          <button
            id="theme-toggle"
            class="icon-btn"
            title="切换主题 (Ctrl+T)"
            aria-label="切换主题"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Display Area -->
      <div class="display-area">
        <div class="formula-display" id="formula-display"></div>
        <div class="result-display" id="result-display">
          <span id="result-text">0</span>
          <button id="copy-btn" class="copy-btn" title="复制结果" aria-label="复制结果">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
        <div class="error-display" id="error-display"></div>
      </div>

      <!-- Mode Tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="standard">标准</button>
        <button class="mode-tab" data-mode="complex">复数</button>
        <button class="mode-tab" data-mode="matrix">矩阵</button>
        <button class="mode-tab" data-mode="vector">向量</button>
        <button class="mode-tab" data-mode="solve">求解</button>
        <button class="mode-tab" data-mode="base">进制</button>
        <button class="mode-tab" data-mode="convert">换算</button>
        <button class="mode-tab" data-mode="stats">统计</button>
      </div>

      <!-- Helper Panel -->
      <div id="helper-panel" class="helper-panel"></div>

      <!-- Memory Buttons -->
      <div class="memory-buttons">
        <button class="memory-btn" data-action="mc" title="清除内存">MC</button>
        <button class="memory-btn" data-action="mr" title="读取内存">MR</button>
        <button class="memory-btn" data-action="m+" title="内存加">M+</button>
        <button class="memory-btn" data-action="m-" title="内存减">M-</button>
        <button class="memory-btn" data-action="ms" title="存储内存">MS</button>
      </div>

      <!-- Calculator Buttons -->
      <div class="calculator-buttons">
        <!-- Row 1: Scientific Functions -->
        <div class="button-row">
          <button class="calc-btn function-btn" data-action="asin">sin⁻¹</button>
          <button class="calc-btn function-btn" data-action="acos">cos⁻¹</button>
          <button class="calc-btn function-btn" data-action="atan">tan⁻¹</button>
          <button class="calc-btn function-btn" data-action="abs">|x|</button>
          <button class="calc-btn function-btn" data-action="floor">⌊x⌋</button>
        </div>

        <!-- Row 2: More Scientific Functions -->
        <div class="button-row">
          <button class="calc-btn function-btn" data-action="sin">sin</button>
          <button class="calc-btn function-btn" data-action="cos">cos</button>
          <button class="calc-btn function-btn" data-action="tan">tan</button>
          <button class="calc-btn function-btn" data-action="sqrt">√</button>
          <button class="calc-btn function-btn" data-action="ceil">⌈x⌉</button>
        </div>

        <!-- Row 3: Logarithms and Power -->
        <div class="button-row">
          <button class="calc-btn function-btn" data-action="log">log</button>
          <button class="calc-btn function-btn" data-action="ln">ln</button>
          <button class="calc-btn operator-btn" data-action="^">^</button>
          <button class="calc-btn paren-btn" data-action="left-paren">(</button>
          <button class="calc-btn paren-btn" data-action="right-paren">)</button>
        </div>

        <!-- Row 4: Numbers 7-9 -->
        <div class="button-row">
          <button class="calc-btn number-btn" data-action="7">7</button>
          <button class="calc-btn number-btn" data-action="8">8</button>
          <button class="calc-btn number-btn" data-action="9">9</button>
          <button class="calc-btn clear-btn" data-action="ac">AC</button>
          <button class="calc-btn delete-btn" data-action="backspace">⌫</button>
        </div>

        <!-- Row 5: Numbers 4-6 -->
        <div class="button-row">
          <button class="calc-btn number-btn" data-action="4">4</button>
          <button class="calc-btn number-btn" data-action="5">5</button>
          <button class="calc-btn number-btn" data-action="6">6</button>
          <button class="calc-btn operator-btn" data-action="*">×</button>
          <button class="calc-btn operator-btn" data-action="/">÷</button>
        </div>

        <!-- Row 6: Numbers 1-3 -->
        <div class="button-row">
          <button class="calc-btn number-btn" data-action="1">1</button>
          <button class="calc-btn number-btn" data-action="2">2</button>
          <button class="calc-btn number-btn" data-action="3">3</button>
          <button class="calc-btn operator-btn" data-action="+">+</button>
          <button class="calc-btn operator-btn" data-action="-">−</button>
        </div>

        <!-- Row 7: 0, decimal, equals -->
        <div class="button-row">
          <button class="calc-btn number-btn" data-action="0">0</button>
          <button class="calc-btn number-btn" data-action=".">.</button>
          <button class="calc-btn number-btn" data-action="00">00</button>
          <button class="calc-btn number-btn" data-action=",">,</button>
          <button class="calc-btn equals-btn" data-action="=">=</button>
        </div>
      </div>
    </div>

    <!-- History Panel -->
    <aside id="history-panel" class="history-panel sidebar">
      <div class="history-header">
        <h2>历史记录</h2>
        <div>
          <button id="history-clear" class="text-btn">清空</button>
          <button id="history-close" class="icon-btn" aria-label="关闭">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 6L6 18"></path>
              <path d="M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>
      <div id="history-list" class="history-list"></div>
    </aside>

    <!-- Constants Panel -->
    <aside id="constants-panel" class="constants-panel sidebar">
      <div class="constants-header">
        <h2>常量库</h2>
        <button id="constants-close" class="icon-btn" aria-label="关闭">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div id="constants-list" class="constants-list"></div>
    </aside>

    <!-- Variables Panel -->
    <aside id="variables-panel" class="variables-panel sidebar">
      <div class="variables-header">
        <h2>变量列表</h2>
        <button id="variables-close" class="icon-btn" aria-label="关闭">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div id="variables-list" class="variables-list"></div>
    </aside>

    <!-- Table Panel -->
    <aside id="table-panel" class="table-panel sidebar">
      <div class="table-header">
        <h2>数值表格</h2>
        <div>
          <button id="table-close" class="icon-btn" aria-label="关闭">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 6L6 18"></path>
              <path d="M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="table-content">
        <div class="table-inputs">
          <div class="table-field">
            <label>函数 f(x)</label>
            <input type="text" id="table-expression" placeholder="例如：x^2" />
          </div>
          <div class="table-field">
            <label
              >函数 g(x)
              <span style="color: var(--text-secondary); font-size: 0.7rem">（可选）</span></label
            >
            <input type="text" id="table-expression2" placeholder="例如：2x+1" />
          </div>
          <div class="table-row">
            <div class="table-field">
              <label>起始</label>
              <input type="number" id="table-start" value="-5" step="any" />
            </div>
            <div class="table-field">
              <label>结束</label>
              <input type="number" id="table-end" value="5" step="any" />
            </div>
            <div class="table-field">
              <label>步长</label>
              <input type="number" id="table-step" value="1" step="any" />
            </div>
          </div>
          <div class="table-actions">
            <button id="table-generate" class="helper-btn active">生成表格</button>
            <button id="table-plot" class="helper-btn">绘制图像</button>
          </div>
        </div>
        <div class="table-tabs">
          <button class="table-tab active" data-tab="table">表格</button>
          <button class="table-tab" data-tab="plot">图像</button>
        </div>
        <div class="table-result active" id="table-result">
          <div class="table-empty">输入函数并点击生成表格</div>
        </div>
        <div class="plot-result" id="plot-result">
          <div class="plot-empty">输入函数并点击绘制图像</div>
        </div>
      </div>
    </aside>

    <!-- Spreadsheet Panel -->
    <aside id="spreadsheet-panel" class="spreadsheet-panel sidebar">
      <div class="spreadsheet-header">
        <h2>电子表格</h2>
        <div>
          <button id="spreadsheet-clear" class="text-btn">清空</button>
          <button id="spreadsheet-close" class="icon-btn" aria-label="关闭">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 6L6 18"></path>
              <path d="M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="spreadsheet-info">公式: =A1+B1 | 函数: SUM(A1:A10), AVG, COUNT, MAX, MIN</div>
      <div class="spreadsheet-wrap">
        <table class="spreadsheet-table" id="spreadsheet-table"></table>
      </div>
      <div class="spreadsheet-status" id="spreadsheet-status"></div>
    </aside>

    <div id="overlay" class="overlay"></div>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="qr-modal" style="display: none">
      <div class="qr-modal-content">
        <div class="qr-modal-header">
          <h3>QR 码</h3>
          <button id="qr-close" class="icon-btn" aria-label="关闭">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 6L6 18"></path>
              <path d="M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <div class="qr-modal-body">
          <img id="qr-image" alt="QR Code" />
          <div class="qr-text" id="qr-text"></div>
        </div>
      </div>
    </div>

    <!-- Help Sidebar -->
    <aside id="help-sidebar" class="help-sidebar sidebar">
      <div class="help-header">
        <h2>帮助 / Help</h2>
        <button id="help-close" class="icon-btn" aria-label="关闭">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="help-lang-toggle">
        <button id="help-lang-zh" class="helper-btn active">中文</button>
        <button id="help-lang-en" class="helper-btn">English</button>
      </div>
      <div id="help-content" class="help-content"></div>
    </aside>

    <!-- Settings Panel -->
    <aside id="settings-panel" class="settings-panel sidebar">
      <div class="settings-header">
        <h2>设置</h2>
        <button id="settings-close" class="icon-btn" aria-label="关闭">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="settings-content">
        <div class="settings-section">
          <h3>显示</h3>
          <div class="setting-item">
            <label>精度 (小数位数)</label>
            <input type="range" id="precision-slider" min="0" max="15" value="12" />
            <span id="precision-value">12</span>
          </div>
          <div class="setting-item">
            <label>显示格式</label>
            <select id="display-format">
              <option value="norm">标准</option>
              <option value="fix">定点数</option>
              <option value="sci">科学计数法</option>
            </select>
          </div>
          <div class="setting-item">
            <label>角度单位</label>
            <select id="angle-unit">
              <option value="rad">弧度 (RAD)</option>
              <option value="deg">度 (DEG)</option>
              <option value="grad">梯度 (GRAD)</option>
            </select>
          </div>
        </div>
        <div class="settings-section">
          <h3>格式</h3>
          <div class="setting-item">
            <label>工程符号</label>
            <input type="checkbox" id="engineering-notation" />
          </div>
          <div class="setting-item">
            <label>自动补全括号</label>
            <input type="checkbox" id="auto-bracket" checked />
          </div>
          <div class="setting-item">
            <label>千位分隔符</label>
            <input type="checkbox" id="thousand-separator" />
          </div>
          <div class="setting-item">
            <label>小数分隔符</label>
            <select id="decimal-separator">
              <option value=".">点 (.)</option>
              <option value=",">逗号 (,)</option>
            </select>
          </div>
        </div>
        <div class="settings-section">
          <h3>进制</h3>
          <div class="setting-item">
            <label>默认进制</label>
            <select id="base-mode">
              <option value="10">十进制 (DEC)</option>
              <option value="2">二进制 (BIN)</option>
              <option value="8">八进制 (OCT)</option>
              <option value="16">十六进制 (HEX)</option>
            </select>
          </div>
        </div>
      </div>
    </aside>

    <script type="module" src="app.js"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then(registration => {
              console.log('SW registered:', registration);
            })
            .catch(error => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
