<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-src 'none';"
    />
    <title>calculate_JYY</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="header">
        <button
          id="history-toggle"
          class="icon-btn"
          title="历史记录 (Ctrl+H)"
          aria-label="历史记录"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M3 3v5h5"></path>
            <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path>
            <path d="M12 7v5l4 2"></path>
          </svg>
        </button>
        <h1 class="app-title">calculate_JYY</h1>
        <div class="header-actions">
          <button id="constants-toggle" class="icon-btn" title="常量库" aria-label="常量库">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
              <path d="M2 17l10 5 10-5"></path>
              <path d="M2 12l10 5 10-5"></path>
            </svg>
          </button>
          <button id="table-toggle" class="icon-btn" title="数值表格" aria-label="数值表格">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
          </button>
          <button
            id="fraction-toggle"
            class="icon-btn"
            title="分数/小数切换 (S⇔D)"
            aria-label="分数小数切换"
          >
            <span style="font-size: 0.75rem; font-weight: 700">S⇔D</span>
          </button>
          <button id="help-toggle" class="icon-btn" title="帮助 / Help (?)" aria-label="帮助">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </button>
          <button id="settings-toggle" class="icon-btn" title="设置" aria-label="设置">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
          </button>
          <button
            id="theme-toggle"
            class="icon-btn"
            title="切换主题 (Ctrl+T)"
            aria-label="切换主题"
          >
            <svg
              id="theme-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <path
                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
              ></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Display -->
      <div class="display">
        <button id="copy-result" class="copy-btn" title="复制结果">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
        <div id="formula-preview" class="formula-preview" aria-label="公式预览"></div>
        <div id="result-display" class="result-display" role="status" aria-live="polite">0</div>
        <div id="error-display" class="error-display" role="alert"></div>
      </div>

      <!-- Mode Tabs -->
      <div class="mode-tabs" role="tablist" aria-label="计算模式">
        <button class="mode-tab active" data-mode="standard" role="tab" aria-selected="true">
          标准
        </button>
        <button class="mode-tab" data-mode="complex" role="tab" aria-selected="false">复数</button>
        <button class="mode-tab" data-mode="matrix" role="tab" aria-selected="false">矩阵</button>
        <button class="mode-tab" data-mode="vector" role="tab" aria-selected="false">向量</button>
        <button class="mode-tab" data-mode="solve" role="tab" aria-selected="false">求解</button>
        <button class="mode-tab" data-mode="base" role="tab" aria-selected="false">进制</button>
        <button class="mode-tab" data-mode="convert" role="tab" aria-selected="false">换算</button>
        <button class="mode-tab" data-mode="stats" role="tab" aria-selected="false">统计</button>
        <button class="mode-tab" data-mode="calculus" role="tab" aria-selected="false">
          微积分
        </button>
      </div>

      <!-- Helper Panel (dynamic based on mode) -->
      <div class="helper-panel" id="helper-panel">
        <button class="helper-btn" data-insert="i">i</button>
        <button class="helper-btn" data-insert="e">e</button>
        <button class="helper-btn" data-insert="pi">π</button>
        <button class="helper-btn" data-insert="!">!</button>
        <button class="helper-btn" data-insert="%">%</button>
        <button class="helper-btn" data-insert="nPr(">nPr</button>
        <button class="helper-btn" data-insert="nCr(">nCr</button>
        <button class="helper-btn" data-insert="rand()">Rand</button>
        <button class="helper-btn" id="btn-ans" data-insert="ans">Ans</button>
        <button class="helper-btn" id="angle-toggle" data-insert="" title="角度/弧度/百分度">
          RAD
        </button>
      </div>

      <!-- Memory Panel -->
      <div class="memory-panel">
        <button class="memory-btn" data-memory="MC">MC</button>
        <button class="memory-btn" data-memory="MR">MR</button>
        <button class="memory-btn" data-memory="M+">M+</button>
        <button class="memory-btn" data-memory="M-">M-</button>
        <button class="memory-btn" data-memory="MS">MS</button>
      </div>

      <!-- Keypad -->
      <div class="keypad">
        <!-- Row 1: Advanced functions -->
        <button class="key func" data-action="insert" data-value="asin(" aria-label="反正弦">
          sin⁻¹
        </button>
        <button class="key func" data-action="insert" data-value="acos(" aria-label="反余弦">
          cos⁻¹
        </button>
        <button class="key func" data-action="insert" data-value="atan(" aria-label="反正切">
          tan⁻¹
        </button>
        <button class="key func" data-action="insert" data-value="abs(" aria-label="绝对值">
          |x|
        </button>
        <button class="key func" data-action="insert" data-value="floor(" aria-label="向下取整">
          ⌊x⌋
        </button>

        <!-- Row 2 -->
        <button class="key func" data-action="insert" data-value="sin(">sin</button>
        <button class="key func" data-action="insert" data-value="cos(">cos</button>
        <button class="key func" data-action="insert" data-value="tan(">tan</button>
        <button class="key func" data-action="insert" data-value="sqrt(" aria-label="平方根">
          √
        </button>
        <button class="key func" data-action="insert" data-value="ceil(" aria-label="向上取整">
          ⌈x⌉
        </button>

        <!-- Row 3 -->
        <button class="key func" data-action="insert" data-value="log10(">log</button>
        <button class="key func" data-action="insert" data-value="ln(">ln</button>
        <button class="key func" data-action="insert" data-value="^">^</button>
        <button class="key func" data-action="insert" data-value="(">(</button>
        <button class="key func" data-action="insert" data-value=")">)</button>

        <!-- Row 4 -->
        <button class="key num base-num" data-action="insert" data-value="7">7</button>
        <button class="key num base-num" data-action="insert" data-value="8">8</button>
        <button class="key num base-num" data-action="insert" data-value="9">9</button>
        <button class="key func" data-action="clear" data-value="C">AC</button>
        <button class="key func" data-action="backspace" data-value="⌫" aria-label="退格">⌫</button>

        <!-- Row 5 -->
        <button class="key num base-num" data-action="insert" data-value="4">4</button>
        <button class="key num base-num" data-action="insert" data-value="5">5</button>
        <button class="key num base-num" data-action="insert" data-value="6">6</button>
        <button class="key op" data-action="insert" data-value="*" aria-label="乘">×</button>
        <button class="key op" data-action="insert" data-value="/" aria-label="除">÷</button>

        <!-- Row 6 -->
        <button class="key num base-num" data-action="insert" data-value="1">1</button>
        <button class="key num base-num" data-action="insert" data-value="2">2</button>
        <button class="key num base-num" data-action="insert" data-value="3">3</button>
        <button class="key op" data-action="insert" data-value="+">+</button>
        <button class="key op" data-action="insert" data-value="-" aria-label="减">−</button>

        <!-- Row 7 -->
        <button class="key num base-num" data-action="insert" data-value="0">0</button>
        <button class="key num base-num" data-action="insert" data-value=".">.</button>
        <button class="key num base-num" data-action="insert" data-value="00">00</button>
        <button class="key num base-num" data-action="insert" data-value=",">,</button>
        <button class="key equals" data-action="calculate" data-value="=">=</button>
      </div>
    </div>

    <!-- History Sidebar -->
    <aside id="history-sidebar" class="history-sidebar sidebar">
      <div class="history-header">
        <h2>历史记录</h2>
        <div>
          <button id="history-export" class="text-btn primary" title="导出为 JSON">导出</button>
          <button id="history-clear" class="text-btn">清空</button>
          <button id="history-close" class="icon-btn" aria-label="关闭">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 6L6 18"></path>
              <path d="M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="history-search">
        <input type="text" id="history-search-input" placeholder="搜索历史记录..." />
      </div>
      <div id="history-list" class="history-list">
        <div class="history-empty">暂无历史记录</div>
      </div>
    </aside>

    <!-- Constants Sidebar -->
    <aside id="constants-sidebar" class="constants-sidebar sidebar">
      <div class="constants-header">
        <h2>常量库</h2>
        <button id="constants-close" class="icon-btn" aria-label="关闭">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="constants-search">
        <input type="text" id="constants-search-input" placeholder="搜索常量..." />
      </div>
      <div id="constants-list" class="constants-list"></div>
    </aside>

    <!-- Settings Panel -->
    <aside id="settings-panel" class="settings-panel sidebar">
      <div class="settings-header">
        <h2>设置</h2>
        <button id="settings-close" class="icon-btn" aria-label="关闭">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="settings-content">
        <div class="setting-item">
          <label for="precision-setting">结果精度（小数位数）</label>
          <div class="setting-control">
            <input type="range" id="precision-setting" min="0" max="15" value="12" />
            <span id="precision-value">12</span>
          </div>
        </div>
        <div class="setting-item">
          <label>显示格式</label>
          <div class="setting-control format-buttons">
            <button id="format-norm" class="helper-btn active">NORM</button>
            <button id="format-fix" class="helper-btn">FIX</button>
            <button id="format-sci" class="helper-btn">SCI</button>
          </div>
        </div>
        <div class="setting-item">
          <label>当前角度模式</label>
          <div class="setting-control">
            <button id="settings-angle-toggle" class="helper-btn">RAD</button>
          </div>
        </div>
        <div class="setting-item">
          <label>工程符号显示</label>
          <div class="setting-control">
            <button id="engineering-toggle" class="helper-btn">关闭</button>
          </div>
        </div>
        <div class="setting-item">
          <label>括号自动补全</label>
          <div class="setting-control">
            <button id="auto-bracket-toggle" class="helper-btn active">开启</button>
          </div>
        </div>
        <div class="setting-item">
          <label>进制模式基数</label>
          <div class="setting-control format-buttons">
            <button id="base-dec" class="helper-btn active">DEC</button>
            <button id="base-bin" class="helper-btn">BIN</button>
            <button id="base-oct" class="helper-btn">OCT</button>
            <button id="base-hex" class="helper-btn">HEX</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Table Panel -->
    <aside id="table-panel" class="table-panel sidebar">
      <div class="table-header">
        <h2>数值表格</h2>
        <button id="table-close" class="icon-btn" aria-label="关闭">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="table-content">
        <div class="table-inputs">
          <div class="table-field">
            <label>函数 f(x)</label>
            <input type="text" id="table-expression" placeholder="例如：x^2" />
          </div>
          <div class="table-row">
            <div class="table-field">
              <label>起始</label>
              <input type="number" id="table-start" value="-5" step="any" />
            </div>
            <div class="table-field">
              <label>结束</label>
              <input type="number" id="table-end" value="5" step="any" />
            </div>
            <div class="table-field">
              <label>步长</label>
              <input type="number" id="table-step" value="1" step="any" />
            </div>
          </div>
          <div class="table-actions">
            <button id="table-generate" class="helper-btn active">生成表格</button>
            <button id="table-plot" class="helper-btn">绘制图像</button>
          </div>
        </div>
        <div class="table-tabs">
          <button class="table-tab active" data-tab="table">表格</button>
          <button class="table-tab" data-tab="plot">图像</button>
        </div>
        <div class="table-result active" id="table-result">
          <div class="table-empty">输入函数并点击生成表格</div>
        </div>
        <div class="plot-result" id="plot-result">
          <div class="plot-empty">输入函数并点击绘制图像</div>
        </div>
      </div>
    </aside>

    <div id="overlay" class="overlay"></div>

    <!-- Help Sidebar -->
    <aside id="help-sidebar" class="help-sidebar sidebar">
      <div class="help-header">
        <h2>帮助 / Help</h2>
        <button id="help-close" class="icon-btn" aria-label="关闭">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="help-lang-toggle">
        <button id="help-lang-zh" class="helper-btn active">中文</button>
        <button id="help-lang-en" class="helper-btn">English</button>
      </div>
      <div id="help-content" class="help-content"></div>
    </aside>

    <script type="module" src="app.js"></script>
  </body>
</html>
